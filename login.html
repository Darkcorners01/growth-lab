<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Growth Lab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

*{
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    outline:none;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#0f0f0f;
}

.login-card{
    width:360px;
    padding:40px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    text-align:center;
}

.login-card h2{
    color:#fff;
    margin-bottom:25px;
    font-size:32px;
}

.login-card input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #333;
    border-radius:12px;
    background:#2a2a2a;
    color:#fff;
    font-size:16px;
}

.login-card input::placeholder{
    color:#999;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.google-btn{
    margin-top:12px;
    background:#222;
    color:white;
    border:1px solid #444;
}

.google-btn:hover{
    background:#333;
}

.back{
    display:block;
    margin-top:20px;
    color:#bbb;
    text-decoration:none;
}

.back:hover{
    color:#fff;
}
</style>

</head>

<body>

<div class="login-card">

<h2>Welcome user</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Create account</button>

<button class="google-btn" id="googleLogin">
    Continue with Google
</button>

<a href="index.html" class="back">← Back to Home</a>

</div>


<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";

import { 
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyCG1VbOlKKc_bcBgnYqXptjjPFQj5HRRqQ",
  authDomain: "growth-lab-001.firebaseapp.com",
  projectId: "growth-lab-001",
  storageBucket: "growth-lab-001.firebasestorage.app",
  messagingSenderId: "1056072903285",
  appId: "1:1056072903285:web:0d8803782792362b56a63c",
  measurementId: "G-91ZPNR8HL4"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();


document.getElementById("googleLogin").addEventListener("click",()=>{

signInWithPopup(auth, provider)

.then((result)=>{

console.log("Logged in:", result.user);

alert("Login successful!");

window.location.replace("index.html");

})

.catch((error)=>{

console.log(error);

alert(error.message);

});

});

</script>


</body>
</html>
