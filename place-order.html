<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Place New Order | Growth Lab</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    background:linear-gradient(135deg,#0f0f10,#181818,#101114);

    background-size:400% 400%;

    animation:bgFlow 15s ease infinite;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}


@keyframes bgFlow{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}



.container{

    width:100%;
    max-width:430px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.12);

    padding:30px;

    border-radius:28px;

}



h1{

text-align:center;
font-size:28px;
margin-bottom:10px;

}



.subtitle{

text-align:center;
color:#bbb;
margin-bottom:25px;

}



label{

display:block;
margin:15px 0 8px;
font-weight:600;

}



input,
select{

width:100%;

padding:14px;

border-radius:15px;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:white;

outline:none;

font-size:15px;

}



select option{

background:#111;
color:white;

}



button{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:25px;

background:white;

color:#111;

font-size:16px;

font-weight:600;

cursor:pointer;

}



.back{

text-align:center;

margin-top:20px;

}



.back a{

color:#bbb;

text-decoration:none;

}


</style>

</head>


<body>


<div class="container">


<h1>
Place New Order 🚀
</h1>


<p class="subtitle">
Instagram Growth Services
</p>



<label>
Instagram Username / Link
</label>

<input id="username" type="text" placeholder="@username">



<label>
Select Service
</label>

<select id="service" onchange="updatePackages()">

<option value="">Choose Service</option>

<option value="Followers 📈">Followers 📈</option>

<option value="Views 👁️">Views 👁️</option>

<option value="Likes ❤️">Likes ❤️</option>

</select>



<label>
Select Package
</label>

<select id="package">

<option>Select Package</option>

</select>



<button onclick="submitOrder()">

Submit Order 🚀

</button>



<div class="back">

<a href="dashboard.html">
← Back to Dashboard
</a>

</div>


</div>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { getFirestore, collection, addDoc, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyCG1VbOlKKc_bcBgnYqXptjjPFQj5HRRqQ",

authDomain: "growth-lab-001.firebaseapp.com",

projectId: "growth-lab-001",

storageBucket: "growth-lab-001.firebasestorage.app",

messagingSenderId: "1056072903285",

appId: "1:1056072903285:web:0d8803782792362b56a63c",

measurementId: "G-91ZPNR8HL4"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);





const packages = {


"Followers 📈":[

"10 Followers | ₹2 (Demo)",

"100 Followers | ₹19",

"500 Followers | ₹79",

"1000 Followers | ₹149",

"5000 Followers | ₹799"

],



"Views 👁️":[

"100 Views | ₹2 (Demo)",

"1000 Views | ₹9",

"10,000 Views | ₹50",

"100,000 Views | ₹69",

"1,000,000 Views | ₹699"

],



"Likes ❤️":[

"100 Likes | ₹5 (Demo)",

"500 Likes | ₹29",

"1000 Likes | ₹49",

"5000 Likes | ₹149",

"10,000 Likes"

]


};





window.updatePackages = function(){


let service =
document.getElementById("service").value;


let packageBox =
document.getElementById("package");



packageBox.innerHTML =
"<option>Select Package</option>";



if(packages[service]){


packages[service].forEach(item=>{


let option=document.createElement("option");

option.textContent=item;

packageBox.appendChild(option);


});


}


};






window.submitOrder = async function(){


let username =
document.getElementById("username").value.trim();


let service =
document.getElementById("service").value;


let packageName =
document.getElementById("package").value;



if(username=="" || service=="" || packageName=="Select Package"){


alert("Please fill all details");

return;

}



try{


await addDoc(collection(db,"orders"),{


username: username,

service: service,

package: packageName,

status:"Processing",

createdAt: serverTimestamp()


});



alert("Order placed successfully 🚀");


window.location.href="track.html";


}

catch(error){


console.log(error);

alert("Something went wrong");


}



};


</script>


</body>

</html>
