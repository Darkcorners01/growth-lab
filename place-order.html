<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Place New Order | Growth Lab</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{

    min-height:100vh;
    background:#f5f5f7;

    display:flex;
    justify-content:center;
    align-items:center;

}


.container{

    width:90%;
    max-width:430px;

    background:white;

    padding:30px;

    border-radius:28px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.08);

}


h1{

    text-align:center;

    font-size:28px;

    margin-bottom:10px;

}


.subtitle{

    text-align:center;

    color:#777;

    margin-bottom:25px;

}



label{

    display:block;

    margin:15px 0 8px;

    font-weight:600;

}



input,
select{

    width:100%;

    padding:14px;

    border-radius:15px;

    border:1px solid #ddd;

    outline:none;

    font-size:15px;

}



button{

    width:100%;

    margin-top:25px;

    padding:15px;

    border:none;

    border-radius:25px;

    background:#111;

    color:white;

    font-size:16px;

    cursor:pointer;

    -webkit-tap-highlight-color:transparent;

}



button:hover{

    opacity:.85;

}



.back{

    text-align:center;

    margin-top:20px;

}


.back a{

    text-decoration:none;

    color:#555;

}



</style>


</head>


<body>


<div class="container">


<h1>
Place New Order 🚀
</h1>


<p class="subtitle">
Instagram Growth Services
</p>



<label>
Instagram Username / Link
</label>


<input 
id="username"
type="text"
placeholder="@username">





<label>
Select Service
</label>


<select id="service" onchange="updatePackages()">


<option value="">
Choose Service
</option>


<option value="Followers 📈">
Followers 📈
</option>


<option value="Views 👁️">
Views 👁️
</option>


<option value="Likes ❤️">
Likes ❤️
</option>


</select>





<label>
Select Package
</label>


<select id="package">


<option>
Select Package
</option>


</select>





<button onclick="submitOrder()">

Submit Order 🚀

</button>





<div class="back">

<a href="dashboard.html">

← Back to Dashboard

</a>

</div>



</div>





<script>


const packages = {


"Followers 📈":[

"10 Followers | ₹2 (Demo)",

"100 Followers | ₹19",

"500 Followers | ₹79",

"1000 Followers | ₹149",

"5000 Followers | ₹799"

],



"Views 👁️":[

"100 Views | ₹2 (Demo)",

"1000 Views | ₹9",

"10,000 Views | ₹50",

"100,000 Views | ₹69",

"1,000,000 Views | ₹699"

],



"Likes ❤️":[

"100 Likes | ₹5 (Demo)",

"500 Likes | ₹29",

"1000 Likes | ₹49",

"5000 Likes | ₹149",

"10,000 Likes"

]


};





function updatePackages(){


let service =
document.getElementById("service").value;


let packageBox =
document.getElementById("package");



packageBox.innerHTML =
"<option>Select Package</option>";



if(packages[service]){


packages[service].forEach(function(item){


let option =
document.createElement("option");


option.textContent=item;


packageBox.appendChild(option);


});


}


}







function submitOrder(){


let username =
document.getElementById("username").value;


let service =
document.getElementById("service").value;


let packageName =
document.getElementById("package").value;




if(username=="" || service=="" || packageName=="Select Package"){


alert("Please fill all details");


return;


}





let formURL =

"https://docs.google.com/forms/d/e/1FAIpQLSf6UXG6zSJKB1rBUXnJ-4YYv8AWhf0ADEf9ckW0TIGRWSF0Cg/formResponse";





let formData = new FormData();




formData.append(

"entry.904217290",

username

);



formData.append(

"entry.497299402",

"Instagram"

);



formData.append(

"entry.1565986802",

service

);



formData.append(

"entry.368172193",

packageName

);






fetch(formURL,{

method:"POST",

mode:"no-cors",

body:formData

});






alert("Order placed successfully 🚀");



window.location.href="track.html";



}



</script>



</body>

</html>
