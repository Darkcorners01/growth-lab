<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Growth Lab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:linear-gradient(135deg,#0f0f10,#181818,#101114);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:30px;
    text-align:center;
}

img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,.2);
}

h2{
    margin-top:18px;
}

p{
    color:#bbb;
    margin-top:8px;
    word-break:break-word;
}

.status{
    margin-top:18px;
    color:#57ff88;
    font-weight:bold;
}

.btn{
    display:block;
    width:100%;
    margin-top:20px;
    padding:16px;
    text-decoration:none;
    border-radius:50px;
    color:white;
    text-align:center;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
}

.logout{
    background:rgba(255,0,0,.25);
    border:1px solid rgba(255,0,0,.25);
}
</style>

</head>
<body>

<div class="card">

<img id="photo" src="https://via.placeholder.com/100">

<h2 id="name">Loading...</h2>

<p id="email">Loading...</p>

<div class="status">✓ Signed in with Google</div>

<a href="dashboard.html" class="btn">
⬅ Back to Dashboard
</a>

<a href="#" class="btn logout" id="logoutBtn">
🚪 Logout
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyCG1VbOlKKc_bcBgnYqXptjjPFQj5HRRqQ",
authDomain:"growth-lab-001.firebaseapp.com",
projectId:"growth-lab-001",
storageBucket:"growth-lab-001.firebasestorage.app",
messagingSenderId:"1056072903285",
appId:"1:1056072903285:web:0d8803782792362b56a63c",
measurementId:"G-91ZPNR8HL4"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("photo").src=user.photoURL;
document.getElementById("name").textContent=user.displayName;
document.getElementById("email").textContent=user.email;

}else{

window.location.replace("login.html");

}

});

document.getElementById("logoutBtn").onclick=()=>{

signOut(auth).then(()=>{

window.location.replace("index.html");

});

};

</script>

</body>
</html>
