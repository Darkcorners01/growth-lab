<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Successful | Growth Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{

min-height:100vh;

background:linear-gradient(135deg,#0f0f10,#181818,#101114);

color:white;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


.card{

width:100%;

max-width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

padding:35px;

border-radius:30px;

text-align:center;

}



.check{

font-size:60px;

margin-bottom:20px;

}



h1{

font-size:30px;

margin-bottom:15px;

}



p{

color:#bbb;

line-height:1.6;

}



.order{

margin:25px 0;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.1);

font-size:22px;

font-weight:700;

}



button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:25px;

font-weight:700;

font-size:16px;

}



.track{

background:white;

color:#111;

}


.home{

background:rgba(255,255,255,.12);

color:white;

}


a{

text-decoration:none;

}



</style>

</head>


<body>


<div class="card">


<div class="check">
✅
</div>


<h1>
Order Placed!
</h1>


<p>
Your order has been received successfully.
</p>



<div class="order" id="orderID">

Loading...

</div>



<p>
Save this Order ID to track your order.
</p>



<a href="track.html">

<button class="track">
Track Order 📦
</button>

</a>



<a href="dashboard.html">

<button class="home">
Dashboard
</button>

</a>



</div>





<script>


const id = localStorage.getItem("orderID");


if(id){

document.getElementById("orderID").innerHTML=id;

}

else{

document.getElementById("orderID").innerHTML="No Order ID";

}


</script>



</body>

</html>
