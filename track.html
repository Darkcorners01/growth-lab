<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order | Growth Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}


body{

min-height:100vh;

background:linear-gradient(135deg,#0f0f10,#181818,#101114);

background-size:400% 400%;

animation:bgFlow 15s infinite;

color:white;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



@keyframes bgFlow{

0%{background-position:0% 50%}

50%{background-position:100% 50%}

100%{background-position:0% 50%}

}



.container{

width:100%;

max-width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

border-radius:28px;

padding:30px;

}



h1{

text-align:center;

margin-bottom:20px;

}



input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:white;

outline:none;

}



button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:25px;

font-weight:700;

background:white;

color:#111;

}



.result{

display:none;

margin-top:25px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.08);

}



.result p{

margin:12px 0;

color:#ddd;

}



.status{

font-size:22px;

font-weight:700;

}



.back{

text-align:center;

margin-top:20px;

}



.back a{

color:#aaa;

text-decoration:none;

}
/* TRACK PAGE ENTER */

.container{
    animation:trackEnter .8s ease;
}


@keyframes trackEnter{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}



/* PROGRESS CARD */

.progress-card,
.order-card,
.tracker{

    animation:cardReveal .7s ease;

}



@keyframes cardReveal{

    from{
        opacity:0;
        transform:scale(.96);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}



/* STATUS ICON POP */

.status-icon,
.step-icon,
.circle{

    animation:iconPulse 2.5s infinite;

}



@keyframes iconPulse{

    0%,100%{

        box-shadow:0 0 0 rgba(255,255,255,0);

    }

    50%{

        box-shadow:0 0 20px rgba(255,255,255,.35);

    }

}



/* PROGRESS LINE ANIMATION */

.progress-line,
.line{

    animation:lineGrow 1.5s ease;

}



@keyframes lineGrow{

    from{

        height:0;

        opacity:0;

    }

    to{

        opacity:1;

    }

}



/* STEP APPEAR ONE BY ONE */

.step:nth-child(1){

    animation:stepShow .5s ease;

}


.step:nth-child(2){

    animation:stepShow .7s ease;

}


.step:nth-child(3){

    animation:stepShow .9s ease;

}


.step:nth-child(4){

    animation:stepShow 1.1s ease;

}



@keyframes stepShow{

    from{

        opacity:0;

        transform:translateX(-20px);

    }

    to{

        opacity:1;

        transform:translateX(0);

    }

}
  
</style>

</head>



<body>



<div class="container">


<h1>
Track Order 📦
</h1>



<input 
id="orderID"
placeholder="Enter Order ID (GL-xxxxx)">



<button onclick="trackOrder()">

Track Order 🚀

</button>



<div class="result" id="result">


<p id="id"></p>

<p id="service"></p>

<p id="package"></p>

<p class="status" id="status"></p>



</div>




<div class="back">

<a href="dashboard.html">
← Dashboard
</a>

</div>



</div>





<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";



import {

getFirestore,

collection,

query,

where,

getDocs

}

from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";






const firebaseConfig = {


apiKey:"AIzaSyCG1VbOlKKc_bcBgnYqXptjjPFQj5HRRqQ",

authDomain:"growth-lab-001.firebaseapp.com",

projectId:"growth-lab-001",

storageBucket:"growth-lab-001.firebasestorage.app",

messagingSenderId:"1056072903285",

appId:"1:1056072903285:web:0d8803782792362b56a63c",

measurementId:"G-91ZPNR8HL4"

};




const app = initializeApp(firebaseConfig);


const db = getFirestore(app);






window.trackOrder = async function(){



let id = document
.getElementById("orderID")
.value
.trim();




if(id==""){

alert("Enter Order ID");

return;

}





const q = query(

collection(db,"orders"),

where("orderID","==",id)

);





const snapshot = await getDocs(q);





if(snapshot.empty){


alert("Order not found");


return;


}




snapshot.forEach((doc)=>{


let data = doc.data();



document.getElementById("result").style.display="block";



document.getElementById("id").innerHTML=

"Order ID: "+data.orderID;



document.getElementById("service").innerHTML=

"Service: "+data.service;



document.getElementById("package").innerHTML=

"Package: "+data.package;



document.getElementById("status").innerHTML=

"Status: "+data.status;



});



};



</script>


</body>

</html>
