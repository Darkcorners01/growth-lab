<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order | Growth Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{

min-height:100vh;

background:linear-gradient(135deg,#0f0f10,#181818,#101114);

color:white;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


.container{

width:100%;

max-width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

padding:30px;

border-radius:28px;

}



h1{

text-align:center;

margin-bottom:20px;

}



input{

width:100%;

padding:14px;

border-radius:15px;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:white;

outline:none;

}



button{

width:100%;

margin-top:20px;

padding:15px;

border:none;

border-radius:25px;

background:white;

color:#111;

font-weight:700;

}



.result{

margin-top:25px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.08);

display:none;

}



p{

margin:10px 0;

color:#ccc;

}


</style>

</head>


<body>


<div class="container">


<h1>
Track Order 📦
</h1>


<input id="orderID" placeholder="Enter Order ID">


<button onclick="trackOrder()">

Track Order

</button>


<div class="result" id="result">

<p id="username"></p>

<p id="service"></p>

<p id="package"></p>

<p id="status"></p>

</div>


</div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";


import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";



const firebaseConfig = {

apiKey:"AIzaSyCG1VbOlKKc_bcBgnYqXptjjPFQj5HRRqQ",

authDomain:"growth-lab-001.firebaseapp.com",

projectId:"growth-lab-001",

storageBucket:"growth-lab-001.firebasestorage.app",

messagingSenderId:"1056072903285",

appId:"1:1056072903285:web:0d8803782792362b56a63c",

measurementId:"G-91ZPNR8HL4"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



window.trackOrder = async function(){


let id =
document.getElementById("orderID").value.trim();


if(id==""){

alert("Enter Order ID");

return;

}



const snap = await getDoc(doc(db,"orders",id));



if(snap.exists()){


let data=snap.data();


document.getElementById("result").style.display="block";


document.getElementById("username").innerHTML =
"Username: "+data.username;


document.getElementById("service").innerHTML =
"Service: "+data.service;


document.getElementById("package").innerHTML =
"Package: "+data.package;


document.getElementById("status").innerHTML =
"Status: "+data.status;



}

else{


alert("Order not found");

}



}


</script>


</body>

</html>
