<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Growth Lab Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color: transparent;
}
body{
    background:linear-gradient(135deg,#0f0f10,#181818,#101114);
    background-size:400% 400%;
    animation:bgFlow 15s ease infinite;
    color:#fff;
    min-height:100vh;
    padding:20px;
}

@keyframes bgFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:450px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:28px;
    font-weight:700;
}

.profile{
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.welcome{
    margin-bottom:25px;
}

.welcome h2{
    font-size:32px;
}

.welcome p{
    color:#bbb;
    margin-top:5px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:30px;
}

.stat-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.stat-card h3{
    font-size:30px;
    margin-bottom:8px;
}

.stat-card p{
    color:#bbb;
    font-size:14px;
}

.section-title{
    margin:20px 0 15px;
    font-size:22px;
}

.action{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:18px;
    margin-bottom:15px;
    text-decoration:none;
    color:#fff;
    transition:.3s;
}

.action:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.12);
}

.activity{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    color:#bbb;
    margin-top:15px;
}

.logout{
    display:block;
    width:100%;
    margin-top:35px;
    padding:16px;
    text-align:center;
    text-decoration:none;
    color:white;
    border-radius:50px;
    background:rgba(255,0,0,0.25);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,0,0,0.25);
    transition:.3s;
}

.logout:hover{
    background:rgba(255,0,0,0.25);
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">Growth Lab</div>
<div class="profile">👤</div>
</div>

<div class="welcome">
<h2>Welcome Back 👋</h2>
<p>Manage your social growth from one place.</p>
</div>

<div class="stats">

<div class="stat-card">
<h3>0</h3>
<p>Orders</p>
</div>

<div class="stat-card">
<h3>0</h3>
<p>Pending</p>
</div>

<div class="stat-card">
<h3>0</h3>
<p>Completed</p>
</div>

</div>

<h3 class="section-title">Quick Actions</h3>

<a href="order.html" class="action">
<span>🛒 Place New Order</span>
<span>›</span>
</a>

<a href="track.html" class="action">
<span>📦 Track Orders</span>
<span>›</span>
</a>

<a href="payment.html" class="action">
<span>💳 Payments</span>
<span>›</span>
</a>

<a href="profile.html" class="action">
<span>⚙️ Profile</span>
<span>›</span>
</a>

<h3 class="section-title">Recent Activity</h3>

<div class="activity">
No orders yet.
</div>

<a href="login.html" class="logout">
Logout
</a>

</div>

</body>
</html>
